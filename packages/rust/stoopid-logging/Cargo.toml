[package]
name = "stoopid-logging"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Structured JSON logging for Rust services, conforming to the stoopid-commons shared log-event schema."
homepage = "https://github.com/stoopidJSON/stoopid-commons"
documentation = "https://docs.rs/stoopid-logging"
readme = "README.md"
keywords = ["logging", "tracing", "json", "opentelemetry", "structured"]
categories = ["development-tools::debugging"]

[lib]
name = "stoopid_logging"
path = "src/lib.rs"

[dependencies]
tracing = "0.1"
tracing-core = "0.1"
tracing-subscriber = { version = "0.3", features = ["registry", "env-filter", "fmt"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = { version = "0.3", features = ["formatting", "macros"] }
thiserror = "1"

tracing-opentelemetry = { version = "0.27", optional = true }
opentelemetry = { version = "0.26", optional = true }

[dev-dependencies]
jsonschema = { version = "0.18", features = ["draft202012"] }
opentelemetry_sdk = "0.26"

[features]
default = []
otel = ["dep:tracing-opentelemetry", "dep:opentelemetry"]

[lints]
workspace = true
