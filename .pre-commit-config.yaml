default_install_hook_types:
  - pre-commit
  - commit-msg

default_stages:
  - pre-commit

# Speed matters. If a hook gets slow, move it to CI.
fail_fast: false

repos:
  # ===========================================================================
  # Universal hygiene
  # ===========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: "^(charts/.*/templates/|\\.github/workflows/.*\\.ya?ml$)"
      - id: check-json
      - id: check-toml
      - id: check-xml

  # ===========================================================================
  # Secret scanning (catch before push, not just at PR time)
  # ===========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ===========================================================================
  # Conventional Commits validation
  # ===========================================================================
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]

  # ===========================================================================
  # Markdown
  # ===========================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--disable, MD013, MD033, MD041, "--"]
        # MD013: line length (handled by editorconfig/prettier)
        # MD033: inline HTML (sometimes necessary)
        # MD041: first line h1 (not always desired)

        # ===========================================================================
        # YAML
        # ===========================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, "{extends: relaxed, rules: {line-length: {max: 200}}}"]
        exclude: "^(charts/.*/templates/|\\.github/workflows/.*\\.ya?ml$)"

  # ===========================================================================
  # Shell scripts
  # ===========================================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: [-i, "2", -ci, -bn, -w]

  # ===========================================================================
  # Dockerfile
  # ===========================================================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3018]

  # ===========================================================================
  # Python — runs only when Python files are staged
  # ===========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ===========================================================================
  # Rust — runs only when Rust files are staged
  # ===========================================================================
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: cargo-check

  # ===========================================================================
  # Terraform — runs only when Terraform files are staged
  # ===========================================================================
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
      - id: terraform_validate

  # ===========================================================================
  # TypeScript / JavaScript — uses local pnpm
  # ===========================================================================
  # ESLint and Prettier run via the project's local install rather than a
  # pinned pre-commit version. This keeps editor and CI behavior identical
  # to the hook behavior.
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: pnpm exec eslint --fix
        files: \.(js|jsx|ts|tsx|mjs|cjs)$
        pass_filenames: true
        require_serial: false

      - id: prettier
        name: prettier
        language: system
        entry: bash -c 'test -f package.json && pnpm exec prettier --write
          --ignore-unknown "$@" || exit 0' --
        files: \.(js|jsx|ts|tsx|mjs|cjs|json|jsonc|css|scss|html)$
        pass_filenames: true
        require_serial: false

  # ===========================================================================
  # Documentation — runs only when ADR files or the index change
  # ===========================================================================
  - repo: local
    hooks:
      - id: adr-lint
        name: adr-lint
        language: system
        entry: scripts/adr-lint.py
        files: ^docs/adrs/.*\.md$
        pass_filenames: false
        require_serial: true
        description: >
          Validate ADR numbering, status fields, supersession references, and
          index synchronization. Runs on the entire docs/adrs/ tree, not just
          changed files, because ADR integrity is a global property (gaps,
          duplicates, cross-references).

ci:
  autofix_commit_msg: "style: pre-commit auto-fixes"
  autoupdate_commit_msg: "chore(deps): pre-commit autoupdate"
  autoupdate_schedule: monthly
  skip:
    - eslint
    - prettier
    - cargo-check
    - terraform_validate
    - adr-lint
